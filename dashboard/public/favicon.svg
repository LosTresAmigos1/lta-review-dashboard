<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: deep midnight with subtle radial light at apex -->
    <radialGradient id="bg" cx="50%" cy="26%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#18304E"/>
      <stop offset="100%" stop-color="#05090F"/>
    </radialGradient>

    <!-- Chevron: pure white at apex → sky blue → electric blue at base -->
    <linearGradient id="v" x1="256" y1="124" x2="256" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="26%"  stop-color="#E0F2FE"/>
      <stop offset="55%"  stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <!-- Soft halo behind the apex — the intelligence focal point -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="42%"  stop-color="#7DD3FC" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38BDF8"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Apex glow halo (sits behind the chevron stroke) -->
  <circle cx="256" cy="124" r="64" fill="url(#halo)"/>

  <!-- The VERTEX mark: two precision bars meeting at a single apex -->
  <path d="M 86 394 L 256 124 L 426 394"
        fill="none"
        stroke="url(#v)"
        stroke-width="54"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
